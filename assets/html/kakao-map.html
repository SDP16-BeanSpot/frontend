<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8"/>
	<title>Kakao Maps</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
<!-- </head> -->
<body>
<div id="map"></div>

<script>
    // React Native WebView로부터 API 키를 받기 위한 리스너 설정
    // postMessage를 사용할 경우, 아래와 같이 리스너를 추가할 수 있습니다.
    // 현재는 injectedJavaScript를 사용하므로 이 코드는 참고용입니다.
    // document.addEventListener("message", function(event) {
    //     const { apiKey } = JSON.parse(event.data);
    //     if (apiKey) {
    //         loadKakaoMap(apiKey);
    //     }
    // });

    // InjectedJavaScript로부터 직접 키를 읽어옵니다.
    if (window.kakaoMapsApiKey) {
        loadKakaoMap(window.kakaoMapsApiKey);
    } else {
        // 키가 즉시 주입되지 않는 경우를 대비한 폴백
        window.addEventListener('message', function(event) {
            try {
                const data = JSON.parse(event.data);
                if (data.apiKey) {
                    loadKakaoMap(data.apiKey);
                }
            } catch(e) {
                // Do nothing
            }
        });
    }

    function loadKakaoMap(apiKey) {
        const script = document.createElement('script');
        script.type = 'text/javascript';
        // autoload=false를 추가하여 수동으로 지도를 로드합니다.
        script.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${apiKey}&autoload=false`;
        script.onload = () => {
            // 스크립트가 로드되면 kakao.maps.load를 통해 지도를 초기화합니다.
            kakao.maps.load(initMap);
        };
        document.head.appendChild(script);
    }

    function initMap() {
        var mapContainer = document.getElementById('map');
        var mapOption = { 
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 서울시청
            level: 3 
        };
        var map = new kakao.maps.Map(mapContainer, mapOption);
    }
</script>
</body>
</html>
